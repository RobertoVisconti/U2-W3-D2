<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Exercize Local Storage e Session Storage</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <link rel="stylesheet" href="./assets/index.css" />
  </head>
  <body class="bg-light">
    <header></header>
    <main>
      <!-- User Section -->
      <div class="container mt-3">
        <div class="row d-flex justify-content-center">
          <div class="col-12 col-md-6">
            <h2 class="text-black fw-bold text-center mt-3">User</h2>
            <section>
              <form id="date">
                <div>
                  <label
                    for="firstName"
                    class="form-label text-black fw-bold mt-3"
                  >
                    Username
                  </label>
                  <input
                    type="text"
                    class="form-control mb-2"
                    id="firstName"
                    placeholder="Enter name"
                    required
                  />
                </div>
                <div>
                  <label for="lastName" class="form-label text-black fw-bold">
                    User surname
                  </label>
                  <input
                    type="text"
                    class="form-control mb-2"
                    id="lastName"
                    placeholder="Enter last name"
                    required
                  />
                </div>
                <div>
                  <label for="age" class="form-label text-black fw-bold">
                    User Age
                  </label>
                  <input
                    type="number"
                    class="form-control mb-2"
                    id="age"
                    placeholder="Enter age"
                    required
                  />
                </div>
                <div>
                  <label for="location" class="form-label text-black fw-bold">
                    User Nationality
                  </label>
                  <input
                    type="text"
                    class="form-control mb-2"
                    id="location"
                    placeholder="Enter nazionality"
                    required
                  />
                </div>
                <div class="d-flex justify-content-center">
                  <button class="btn btn-success" type="submit">SAVE</button>
                  <button class="btn btn-danger ms-2" type="button">
                    DELETE
                  </button>
                </div>
              </form>
            </section>
            <!-- Timer Section -->
            <div class="container mt-3 p-0">
              <div class="alert alert-info w-25 text-center">
                Elapsed time: <span id="timer">0</span> seconds
              </div>
            </div>
          </div>
        </div>
      </div>
      <!-- Ul section -->
      <div class="container mt-3 mb-3">
        <div class="row d-flex justify-content-center">
          <div class="col-12 col-md-6">
            <ul id="saveDateUsers" class="list-group"></ul>
          </div>
        </div>
      </div>
    </main>
    <footer></footer>
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
    <script src="./script/index.js"></script>
  </body>
</html>
